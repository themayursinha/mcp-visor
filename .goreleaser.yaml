# Goreleaser configuration for mcp-visor
version: 2

builds:
  - id: mcp-visor
    main: ./cmd/mcp-visor
    binary: mcp-visor
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .Commit }}
      - -X main.date={{ .Date }}
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md
      - examples/policies/*.yaml

checksum:
  name_template: "checksums.txt"

sboms:
  - artifacts: archive
    documents:
      - "${artifact}.spdx.json"

snapshot:
  name_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: themayursinha
    name: mcp-visor
