name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        go-version: ["1.26.4"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6.0.0
        with:
          go-version: ${{ matrix.go-version }}
      - run: go build ./...
      - run: go test ./... -count=1 -timeout 120s -coverprofile=coverage.out

  vulncheck:
    name: Vulnerability scan
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6.0.0
        with:
          go-version: "1.26.4"
      - run: go install golang.org/x/vuln/cmd/govulncheck@v1.4.0
      - run: govulncheck ./...

  lint:
    name: Lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6.0.0
        with:
          go-version: "1.26.4"
      - uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee  # v9.2.1
        with:
          version: v2.12.2
          args: --timeout=5m