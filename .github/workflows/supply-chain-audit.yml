name: Supply Chain Audit

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6.0.0
        with:
          go-version: "1.26.4"

      - name: Audit Go dependencies
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.5.0
          govulncheck ./...

      - name: Verify Docker digest pinning
        run: grep '^FROM ' Dockerfile | grep -q '@sha256:'

      - name: Verify GitHub Actions SHA pinning
        run: |
          ! grep -rE 'uses:\s+[^@]+@v[0-9]' .github/workflows/

      - name: Secrets scan
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e  # v3.0.0