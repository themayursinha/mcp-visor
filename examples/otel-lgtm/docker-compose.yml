# Minimal LGTM for local learning: Grafana all-in-one OTel backend.
# Docs: https://grafana.com/docs/opentelemetry/docker-lgtm/
services:
  otel-lgtm:
    image: grafana/otel-lgtm:0.11.10
    container_name: mcp-visor-otel-lgtm
    ports:
      - "3000:3000"   # Grafana UI (admin/admin on first login)
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    volumes:
      - otel-lgtm-data:/data
    restart: unless-stopped

volumes:
  otel-lgtm-data: